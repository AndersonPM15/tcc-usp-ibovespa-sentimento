# Configurações principais do TCC USP (sentimento x Ibovespa)
# ---------------------------------------------------------------
# Revisão 26/11/2025: Adicionados caminhos base padronizados
#   - BASE_PATH, DATA_RAW, DATA_PROCESSED, DATA_INTERIM, REPORTS_PATH
#   - Caminhos dos arquivos_chave agora são relativos às pastas base
# ---------------------------------------------------------------

# Caminhos base do projeto
paths:
  BASE_PATH: "C:/TCC_USP"
  DATA_RAW: "C:/TCC_USP/data_raw"
  DATA_PROCESSED: "C:/TCC_USP/data_processed"
  DATA_INTERIM: "C:/TCC_USP/data_interim"
  REPORTS_PATH: "C:/TCC_USP/reports"

periodo_estudo:
  start: "2018-01-02"
  end: "2024-12-31"

colunas_data:
  ibov: "day"
  noticias: "day"
  eventos: "event_day"

# ---------------------------------------------------------------
# arquivos_chave: Caminhos RELATIVOS a BASE_PATH (C:/TCC_USP)
# ---------------------------------------------------------------
# IMPORTANTE: Os notebooks do pipeline salvam em data_processed/ ou data_raw/.
# A função get_arquivo() concatena BASE_PATH + caminho abaixo.
# Portanto, os caminhos devem incluir a subpasta correta.
#
# Exemplo: ibov_clean → BASE_PATH/data_processed/ibovespa_clean.csv
#                     → C:/TCC_USP/data_processed/ibovespa_clean.csv
# ---------------------------------------------------------------
arquivos_chave:
  # Dados processados (gerados pelo pipeline, usados pelo dashboard)
  ibov_clean: data_processed/ibovespa_clean.csv
  news_clean: data_processed/news_clean.parquet
  news_multisource: data_processed/news_multisource_clean.parquet
  tfidf_daily_matrix: data_processed/tfidf_daily_matrix.npz
  tfidf_daily_vocab: data_processed/tfidf_daily_vocab.json
  tfidf_daily_index: data_processed/tfidf_daily_index.csv
  labels_y_daily: data_processed/labels_y_daily.csv
  backtest_results: data_processed/18_backtest_results.csv
  latency_events: data_processed/event_study_latency.csv
  dashboard_final: data_processed/20_final_dashboard.html
  
  # Dados brutos (downloads originais)
  ibov_raw: data_raw/ibovespa.csv
